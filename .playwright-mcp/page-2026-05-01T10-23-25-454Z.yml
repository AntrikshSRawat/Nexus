    - generic [ref=e136]:
      - heading "OpenClaw Onboarding" [level=2] [ref=e137]
      - paragraph [ref=e138]: Congratulations on making it to this project. This is an amazing opportunity to learn by living it.
      - paragraph [ref=e139]:
        - text: For the next few weeks to months, you'll get a personal, fully-powered OpenClaw to set up exactly how
        - emphasis [ref=e140]: you
        - text: want it. You'll use it daily to build real life skills i.e. managing time, money, health, learning, relationships while getting first-hand experience building and teaching agents.
      - paragraph [ref=e141]: The intent of this project is to have you build a better personal operating system for yourself with a powerful AI system. As you do this, you can mark thumbs up / thumbs down on its responses which is feedback we’ll use to make the model smarter and better at the complex tasks you ask for.
      - paragraph [ref=e142]: "OpenClaw is a much more powerful AI system than any normal chatbot on the web. It has:"
      - list [ref=e143]:
        - listitem [ref=e144]: A single conversation thread that goes on forever so it can truly remember what you say
        - listitem [ref=e145]: A personal computer its running on in the cloud that gives it the power to download files, access websites, and run apps to help you achieve your goals
        - listitem [ref=e146]: The ability to learn from what you tell it
        - listitem [ref=e147]: The ability to be proactive and always on, even when you’re not talking to it
      - paragraph [ref=e148]: So be ambitious, be bold, and teach your OpenClaw everything you can to make it great for you.
      - heading "Having Builder Perspective" [level=3] [ref=e149]:
        - strong [ref=e150]: Having Builder Perspective
      - list [ref=e151]:
        - listitem [ref=e152]: You are an early builder
        - listitem [ref=e153]: You control what you share, use real info only to the extent you are comfortable
        - listitem [ref=e154]: The more real your use is, the more you learn (and the better your agent gets at helping you)
      - heading "Goal" [level=2] [ref=e155]:
        - strong [ref=e156]: Goal
      - paragraph [ref=e157]: Build realistic, personalized environments for real usage of OpenClaw over weeks to months, reflecting genuine OpenClaw usage and interaction histories.
      - heading "What You'll Get" [level=2] [ref=e158]:
        - strong [ref=e159]: What You'll Get
      - list [ref=e160]:
        - listitem [ref=e161]: Your own hosted vanilla installation of OpenClaw
        - listitem [ref=e162]: A private personal URL, bookmark it, keep it to yourself
        - listitem [ref=e163]: Nearly unlimited usage so you can experiment freely
      - heading "Step 1 - Make It Truly Yours" [level=2] [ref=e164]:
        - strong [ref=e165]: Step 1 - Make It Truly Yours
      - paragraph [ref=e166]:
        - text: Set up OpenClaw like
        - emphasis [ref=e167]: your
        - text: assistant, not a work tool.
      - list [ref=e168]:
        - listitem [ref=e169]:
          - text: "Add what you are comfortable sharing to make it useful:"
          - list [ref=e170]:
            - listitem [ref=e171]: Your profession, routines, and current goals
            - listitem [ref=e172]: The tasks you actually juggle
        - listitem [ref=e173]: Connections to apps you already use
        - listitem [ref=e174]: You decide the boundary. Real info makes the skill-building real but comfort comes first.
      - heading "Step 2 - Onboarding (Your First Build Session)" [level=2] [ref=e175]:
        - strong [ref=e176]: Step 2 - Onboarding (Your First Build Session)
      - list [ref=e177]:
        - listitem [ref=e178]:
          - text: Go mobile. Install Telegram on your phone and connect it to OpenClaw using the normal OpenClaw guide for Telegram.
          - strong [ref=e179]: Please do not connect Whatsapp or any other social media apps
          - text: .
        - listitem [ref=e180]: Plug in your world. Connect 2–3 services with standard OpenClaw connectors (calendar, read-only email, health tracker, etc.).
        - listitem [ref=e181]: Get inspired. Spend 10 minutes on ClawHub (clawhub.ai) to see what other builders are teaching their agents to do.
      - heading "Step 3 - This Is Where You Learn" [level=2] [ref=e182]:
        - strong [ref=e183]: Step 3 - This Is Where You Learn
      - list [ref=e184]:
        - listitem [ref=e185]: "Use OpenClaw as your primary personal chatbot/agent:"
        - listitem [ref=e186]: On the web via your private URL
        - listitem [ref=e187]:
          - text: Install Telegram on their phone and connect it to OpenClaw using the
          - link "normal OpenClaw guide for Telegram" [ref=e188] [cursor=pointer]:
            - /url: https://docs.openclaw.ai/channels/telegram
          - text: . This will let you ask it for help on the go. It’ll remember everything across all devices.
          - text: "*Connect to a few third party services using standard openclaw connectors (eg calendar, readonly email, health trackers, etc.)"
      - paragraph [ref=e189]: Use it for quick questions, deep planning, reminders, coaching.
      - paragraph [ref=e190]:
        - emphasis [ref=e191]:
          - strong [ref=e192]: "Important: Don't use OpenClaw to do your annotation work. This time is for building your life skills."
      - generic [ref=e193]:
        - text: We’ll give you starter prompts, but the magic happens when you go beyond them and solve your own problems.
