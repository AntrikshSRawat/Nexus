      - heading "Step 4 - Teach Us What You Built (in MultiMango)" [level=2] [ref=e195]:
        - strong [ref=e196]: Step 4 - Teach Us What You Built (in MultiMango)
      - list [ref=e197]:
        - listitem [ref=e198]: Each day, open MultiMango. Your OpenClaw chats are imported automatically.
        - listitem [ref=e199]: Just mark the start and end of each new task — this shows us how people naturally break down work with agents.
